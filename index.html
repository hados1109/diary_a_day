<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I smiled today</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div id="auth-screen">
      <div class="auth-container">
        <div class="auth-toggle">
          <span id="toggle-login" class="toggle-label active">Log in</span>
          <div id="auth-mode-toggle" class="toggle-track" role="switch" aria-checked="false">
            <div class="toggle-thumb"></div>
          </div>
          <span id="toggle-signup" class="toggle-label">Sign up</span>
        </div>
        <input id="auth-email" type="email" placeholder="email" autocomplete="email" />
        <div id="password-row">
          <input id="auth-password" type="password" placeholder="password" autocomplete="current-password" />
          <button id="forgot-password-btn">Forgot password</button>
        </div>
        <button id="auth-submit-btn">Log in</button>
        <p id="auth-error"></p>
        <p id="auth-success"></p>
      </div>
    </div>

    <div id="reset-screen" style="display:none">
      <div class="auth-container">
        <div id="reset-form">
          <input id="reset-password" type="password" placeholder="new password" autocomplete="new-password" />
          <input id="reset-confirm" type="password" placeholder="confirm password" autocomplete="new-password" />
          <button id="reset-submit-btn">Confirm</button>
          <p id="reset-error"></p>
        </div>
        <div id="reset-done" class="hidden">
          <p id="reset-done-msg">Password changed.</p>
          <button id="go-to-login-btn">Go to login</button>
        </div>
      </div>
    </div>

    <main class="container hidden" id="diary">
      <div id="diary-header">
        <span id="user-email"></span>
        <button id="logout-btn">Sign out</button>
      </div>

      <div id="add-btn-wrap">
        <button id="add-btn" title="New entry (N)">+</button>
      </div>

      <div id="editor" class="hidden">
        <p id="editor-date" class="entry-date"></p>
        <textarea id="editor-input" placeholder="" spellcheck="false"></textarea>
        <div class="editor-actions">
          <button id="save-btn">Save</button>
          <button id="delete-btn">Delete</button>
        </div>
      </div>

      <div id="entries-list"></div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
